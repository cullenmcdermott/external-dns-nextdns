# Depot CI Migration
# Source: .github/workflows/ci.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  ci:
    name: CI Pipeline
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - uses: actions/checkout@v4
      - name: Run Dagger CI Pipeline
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.11"
          verb: "call"
          args: "ci --source=. export --path=coverage.out"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
        continue-on-error: true
