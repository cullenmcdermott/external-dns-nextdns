# Depot CI Migration
# Source: .github/workflows/ci.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  ci:
    name: CI Pipeline
    runs-on: depot-ubuntu-latest
    env:
      FLOX_DISABLE_METRICS: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Restore Nix cache
        id: nix-cache
        uses: actions/cache/restore@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('.flox/env/manifest.toml') }}
          restore-keys: |
            nix-
      - name: Install Flox
        if: steps.nix-cache.outputs.cache-hit != 'true'
        uses: flox/install-flox-action@v2
      - name: Ensure nix-daemon is running
        run: sudo systemctl start nix-daemon || sudo nix-daemon &
      - name: Activate Flox environment
        run: |
          eval "$(flox activate)"
      - name: Save Nix cache
        if: always() && steps.nix-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('.flox/env/manifest.toml') }}
      - name: Run Dagger CI Pipeline
        run: |
          eval "$(flox activate)"
          dagger call ci --source=. export --path=coverage.out
          echo "Dagger CI pipeline completed successfully"
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
        continue-on-error: true
