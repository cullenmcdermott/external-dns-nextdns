# Depot CI workflow for external-dns-nextdns
# Runs lint, test, build, and docker build using Flox environment

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  ci:
    name: CI Pipeline
    runs-on: depot-ubuntu-latest
    env:
      FLOX_DISABLE_METRICS: "true"
      GOMODCACHE: /home/runner/.cache/go/pkg/mod
      GOCACHE: /home/runner/.cache/go-build
      GOLANGCI_LINT_CACHE: /home/runner/.cache/golangci-lint
    steps:
      - uses: actions/checkout@v4
      - name: Restore Nix cache
        id: nix-cache
        uses: actions/cache/restore@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('.flox/env/manifest.toml') }}
          restore-keys: |
            nix-
      - name: Install Flox
        if: steps.nix-cache.outputs.cache-hit != 'true'
        uses: flox/install-flox-action@v2
      - name: Ensure nix-daemon is running
        run: sudo systemctl start nix-daemon || sudo nix-daemon &
      - name: Activate Flox environment
        run: flox activate -- true
      - name: Restore Go caches
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/go/pkg/mod
            /home/runner/.cache/go-build
            /home/runner/.cache/golangci-lint
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-
      - name: Lint
        run: flox activate -- golangci-lint run
      - name: Test
        run: flox activate -- go test -v -coverprofile=coverage.out ./...
      - name: Build
        run: flox activate -- go build -ldflags="-s -w -X main.Version=dev" -o webhook ./cmd/webhook
      - name: Docker build
        run: flox activate -- docker build -t external-dns-nextdns-webhook:ci .
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
        continue-on-error: true
      - name: Fix Nix permissions for caching
        if: always() && steps.nix-cache.outputs.cache-hit != 'true'
        run: sudo chmod -R a+r /nix && sudo find /nix -type d -exec chmod a+rx {} +
      - name: Save Nix cache
        if: always() && steps.nix-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('.flox/env/manifest.toml') }}
