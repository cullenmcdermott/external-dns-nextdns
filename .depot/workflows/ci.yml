# Depot CI Migration
# Source: .github/workflows/ci.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  ci:
    name: CI Pipeline
    runs-on: depot-ubuntu-latest,dagger=0.19.11
    steps:
      - uses: actions/checkout@v4
      - name: Run Dagger CI Pipeline
        run: dagger call ci --source=. export --path=coverage.out
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
        continue-on-error: true
