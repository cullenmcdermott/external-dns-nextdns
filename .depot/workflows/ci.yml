# Depot CI workflow for external-dns-nextdns
# Runs lint, test, build, and docker build using Flox environment

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  ci:
    name: CI Pipeline
    runs-on: depot-ubuntu-latest
    env:
      FLOX_DISABLE_METRICS: "true"
      GOMODCACHE: /home/runner/.cache/go/pkg/mod
      GOCACHE: /home/runner/.cache/go-build
      GOLANGCI_LINT_CACHE: /home/runner/.cache/golangci-lint
    steps:
      - uses: actions/checkout@v4

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('.flox/env/manifest.toml') }}
          restore-keys: |
            nix-

      - name: Check for existing Flox installation
        id: flox-check
        run: |
          if command -v flox &>/dev/null; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
            echo "Flox already installed: $(flox --version)"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upgrade Flox
        if: steps.flox-check.outputs.installed == 'true'
        run: flox upgrade

      - name: Install Flox
        if: steps.flox-check.outputs.installed != 'true'
        uses: flox/install-flox-action@v2

      - name: Ensure nix-daemon is running
        run: |
          if command -v systemctl &>/dev/null && systemctl is-system-running &>/dev/null; then
            sudo systemctl start nix-daemon
          else
            sudo nix-daemon &
            # Wait for the daemon socket to be ready
            for i in $(seq 1 30); do
              [ -S /nix/var/nix/daemon-socket/socket ] && break
              sleep 0.1
            done
          fi
          # Verify the daemon is responding
          nix store ping 2>/dev/null && echo "nix-daemon is ready" || echo "WARNING: nix-daemon may not be ready"

      - name: Activate Flox environment (verbose)
        run: flox activate -v -- true

      - name: Cache Go dependencies
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/go/pkg/mod
            /home/runner/.cache/go-build
            /home/runner/.cache/golangci-lint
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-

      - name: Lint
        run: flox activate -- golangci-lint run --timeout 5m ./...

      - name: Test
        run: flox activate -- env CGO_ENABLED=1 go test -v -race ./...

      - name: Build
        run: flox activate -- go build -ldflags="-s -w -X main.Version=dev" -o webhook ./cmd/webhook

      - name: Docker build
        run: flox activate -- docker build -t external-dns-nextdns-webhook:ci .

      - name: Fix Nix permissions for caching
        if: always()
        run: sudo chmod -R a+r /nix && sudo find /nix -type d -exec chmod a+rx {} +
