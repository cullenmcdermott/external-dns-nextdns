# Depot CI workflow for external-dns-nextdns
# Runs lint, test, build, and docker build using Flox environment

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  ci:
    name: CI Pipeline
    runs-on: depot-ubuntu-latest
    env:
      FLOX_DISABLE_METRICS: "true"
      GOMODCACHE: /home/runner/.cache/go/pkg/mod
      GOCACHE: /home/runner/.cache/go-build
      GOLANGCI_LINT_CACHE: /home/runner/.cache/golangci-lint
    steps:
      - uses: actions/checkout@v4

      - name: Restore Nix cache
        uses: actions/cache/restore@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('.flox/env/manifest.toml') }}-${{ github.run_id }}
          restore-keys: |
            nix-${{ hashFiles('.flox/env/manifest.toml') }}-
            nix-

      - name: Check for existing Flox installation
        id: flox-check
        run: |
          if command -v flox &>/dev/null; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
            echo "Flox already installed: $(flox --version)"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upgrade Flox
        if: steps.flox-check.outputs.installed == 'true'
        run: flox upgrade

      - name: Install Flox
        if: steps.flox-check.outputs.installed != 'true'
        uses: flox/install-flox-action@v2

      - name: Nix store diagnostics
        run: |
          echo "=== Nix binary location ==="
          which nix 2>/dev/null || echo "nix not on PATH"
          echo ""
          echo "=== Nix DB ==="
          ls -la /nix/var/nix/db/db.sqlite 2>/dev/null || echo "no nix db"
          echo "DB size: $(stat -c%s /nix/var/nix/db/db.sqlite 2>/dev/null || echo 'N/A') bytes"
          echo ""
          echo "=== Store paths on disk vs in DB ==="
          echo "Paths on disk: $(ls /nix/store/ 2>/dev/null | wc -l)"
          echo "Valid paths in DB: $(nix --extra-experimental-features nix-command path-info --all 2>/dev/null | wc -l || echo 'cannot query')"

      - name: Ensure nix-daemon is running
        run: |
          # Try systemd first, fall back to manual daemon
          if command -v systemctl &>/dev/null && systemctl is-system-running &>/dev/null 2>&1; then
            sudo systemctl start nix-daemon
          else
            sudo mkdir -p /nix/var/nix/daemon-socket
            sudo nix-daemon &
          fi
          # Wait for the daemon to be responsive (up to 10s)
          for i in $(seq 1 100); do
            if nix --extra-experimental-features nix-command store ping &>/dev/null; then
              echo "nix-daemon is ready (attempt $i)"
              break
            fi
            sleep 0.1
          done
          # Final check
          nix --extra-experimental-features nix-command store ping &>/dev/null || { echo "ERROR: nix-daemon failed to start"; exit 1; }

      - name: Verify cached store paths
        run: |
          echo "=== Checking if key packages are in store ==="
          for pkg in go golangci-lint 1password-cli git-cliff; do
            path=$(ls -d /nix/store/*-${pkg}-* 2>/dev/null | head -1)
            if [ -n "$path" ]; then
              echo "FOUND: $path"
              nix --extra-experimental-features nix-command path-info --offline "$path" 2>&1 && echo "  -> valid" || echo "  -> INVALID"
            else
              echo "MISSING: $pkg"
            fi
          done

      - name: Activate Flox environment (verbose)
        run: |
          echo "=== Starting flox activate at $(date -u +%Y-%m-%dT%H:%M:%S.%3NZ) ==="
          time flox activate -vv -- true
          echo "=== Finished flox activate at $(date -u +%Y-%m-%dT%H:%M:%S.%3NZ) ==="

      - name: Cache Go dependencies
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/go/pkg/mod
            /home/runner/.cache/go-build
            /home/runner/.cache/golangci-lint
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-

      - name: Lint
        run: flox activate -- golangci-lint run --timeout 5m ./...

      - name: Test
        run: flox activate -- env CGO_ENABLED=1 go test -v -race ./...

      - name: Build
        run: flox activate -- go build -ldflags="-s -w -X main.Version=dev" -o webhook ./cmd/webhook

      - name: Docker build
        run: depot build --project "$DEPOT_PROJECT_ID" --platform linux/amd64 --build-arg VERSION=dev -t external-dns-nextdns-webhook:ci .

      - name: Fix Nix permissions for caching
        if: always()
        run: |
          echo "DB size before: $(stat -c%s /nix/var/nix/db/db.sqlite 2>/dev/null) bytes"
          echo "Valid paths in DB: $(nix --extra-experimental-features nix-command path-info --all 2>/dev/null | wc -l)"
          sudo chmod -R a+r /nix && sudo find /nix -type d -exec chmod a+rx {} +
          echo "DB size after chmod: $(stat -c%s /nix/var/nix/db/db.sqlite 2>/dev/null) bytes"

      - name: Save Nix cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('.flox/env/manifest.toml') }}-${{ github.run_id }}
