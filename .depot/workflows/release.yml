# Depot CI Migration
# Source: .github/workflows/release.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
  packages: write
jobs:
  release:
    name: Build and Release
    runs-on: depot-ubuntu-latest
    env:
      FLOX_DISABLE_METRICS: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore Nix cache
        id: nix-cache
        uses: actions/cache/restore@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('.flox/env/manifest.toml') }}
          restore-keys: |
            nix-
      - name: Install Flox
        if: steps.nix-cache.outputs.cache-hit != 'true'
        uses: flox/install-flox-action@v2
      - name: Ensure nix-daemon is running
        run: sudo systemctl start nix-daemon || sudo nix-daemon &
      - name: Activate Flox environment
        run: |
          eval "$(flox activate)"
      - name: Restore Dagger engine cache
        uses: actions/cache/restore@v4
        id: dagger-cache
        with:
          path: /var/lib/dagger
          key: dagger-engine-${{ hashFiles('dagger.json') }}
          restore-keys: |
            dagger-engine-
      - name: Run Dagger Release Pipeline
        run: |
          eval "$(flox activate)"
          dagger call release \
            --source=. \
            --version=${{ github.ref_name }} \
            --registry-address=ghcr.io \
            --registry-username=${{ github.actor }} \
            --registry-password=env:GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Changelog
        run: |
          eval "$(flox activate)"
          dagger call changelog --source=. export --path=CHANGELOG.md
        continue-on-error: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Fix Nix permissions for caching
        if: always() && steps.nix-cache.outputs.cache-hit != 'true'
        run: sudo chmod -R a+r /nix && sudo find /nix -type d -exec chmod a+rx {} +
      - name: Save Nix cache
        if: always() && steps.nix-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('.flox/env/manifest.toml') }}
      - name: Fix Dagger permissions for caching
        if: always() && steps.dagger-cache.outputs.cache-hit != 'true'
        run: sudo chmod -R a+r /var/lib/dagger 2>/dev/null && sudo find /var/lib/dagger -type d -exec chmod a+rx {} + 2>/dev/null || true
      - name: Save Dagger engine cache
        if: always() && steps.dagger-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /var/lib/dagger
          key: dagger-engine-${{ hashFiles('dagger.json') }}
