# Depot CI workflow for releasing external-dns-nextdns
# Builds multi-platform Docker images and publishes to GHCR

name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
  packages: write
jobs:
  release:
    name: Build and Release
    runs-on: depot-ubuntu-latest
    env:
      FLOX_DISABLE_METRICS: "true"
      GOMODCACHE: /home/runner/.cache/go/pkg/mod
      GOCACHE: /home/runner/.cache/go-build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('.flox/env/manifest.toml') }}
          restore-keys: |
            nix-

      - name: Check for existing Flox installation
        id: flox-check
        run: |
          if command -v flox &>/dev/null; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
            echo "Flox already installed: $(flox --version)"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upgrade Flox
        if: steps.flox-check.outputs.installed == 'true'
        run: flox upgrade

      - name: Install Flox
        if: steps.flox-check.outputs.installed != 'true'
        uses: flox/install-flox-action@v2

      - name: Ensure nix-daemon is running
        run: sudo systemctl start nix-daemon || sudo nix-daemon &

      - name: Activate Flox environment (verbose)
        run: flox activate -vv -- true

      - name: Cache Go dependencies
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/go/pkg/mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-

      - name: Test
        run: flox activate -- go test -v -race ./...

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        run: docker buildx create --use

      - name: Build and push multi-platform image
        run: |
          IMAGE=ghcr.io/${{ github.actor }}/external-dns-nextdns-webhook
          VERSION=${{ github.ref_name }}
          flox activate -- docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VERSION=$VERSION \
            -t $IMAGE:$VERSION \
            -t $IMAGE:latest \
            --push .

      - name: Generate Changelog
        run: flox activate -- git-cliff --config cliff.toml --latest --strip header -o CHANGELOG.md
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix Nix permissions for caching
        if: always()
        run: sudo chmod -R a+r /nix && sudo find /nix -type d -exec chmod a+rx {} +
