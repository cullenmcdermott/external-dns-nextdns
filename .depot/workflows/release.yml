# Depot CI workflow for releasing external-dns-nextdns
# Builds multi-platform Docker images and publishes to GHCR

name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
  packages: write
jobs:
  release:
    name: Build and Release
    runs-on: depot-ubuntu-latest
    env:
      FLOX_DISABLE_METRICS: "true"
      GOMODCACHE: /home/runner/.cache/go/pkg/mod
      GOCACHE: /home/runner/.cache/go-build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until the Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          # 1G = 1073741824
          gc-max-store-size-linux: 5G
          # do purge caches
          purge: true
          # purge all versions of the cache
          purge-prefixes: nix-${{ runner.os }}-
          # created more than this number of seconds ago
          purge-created: 0
          # or last accessed this duration (ISO 8601 duration format)
          # before the start of the `Post Restore and save Nix store` phase
          purge-last-accessed: P1DT12H
          # except any version with the key that is the same as the `primary-key`
          purge-primary-key: never
      - name: Cache Go dependencies
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/go/pkg/mod
            /home/runner/.cache/go-build
            /home/runner/.cache/golangci-lint
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-

      - name: Install Flox
        id: flox-install
        run: |
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
          nix profile add \
            --experimental-features "nix-command flakes" \
            --accept-flake-config \
            'github:flox/flox/v1.11.1'

      - name: Activate Flox environment (verbose)
        run: flox activate -vv -- true

      - name: Test
        run: flox activate -- env CGO_ENABLED=1 go test -v -race ./...

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        run: |
          flox activate -- ko build ./cmd/webhook \
            --platform=linux/amd64,linux/arm64 \
            --tags=${{ github.ref_name }},latest
        env:
          KO_DOCKER_REPO: ghcr.io/${{ github.actor }}/external-dns-nextdns-webhook
          GOFLAGS: -ldflags=-s -w -X main.Version=${{ github.ref_name }}
          GOCACHEPROG: depot gocache

      - name: Generate Changelog
        run: flox activate -- git-cliff --config cliff.toml --latest --strip header -o CHANGELOG.md
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

