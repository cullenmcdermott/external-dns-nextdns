# Depot CI Migration
# Source: .github/workflows/release.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
  packages: write
jobs:
  release:
    name: Build and Release
    runs-on: depot-ubuntu-latest,dagger=0.19.11
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Dagger Release Pipeline
        run: >-
          dagger call release
          --source=.
          --version=${{ github.ref_name }}
          --registry-address=ghcr.io
          --registry-username=${{ github.actor }}
          --registry-password=env:GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Changelog
        run: dagger call changelog --source=. export --path=CHANGELOG.md
        continue-on-error: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
