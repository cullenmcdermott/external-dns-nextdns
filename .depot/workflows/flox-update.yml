# Depot workflow for updating Flox environment packages

name: Update Flox Environment
on:
  schedule:
    # Run weekly on Mondays at 6am UTC (after Renovate runs)
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger
permissions:
  contents: write
  pull-requests: write
jobs:
  update-flox:
    runs-on: depot-ubuntu-latest
    env:
      FLOX_DISABLE_METRICS: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Restore Nix cache
        uses: actions/cache/restore@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('.flox/env/manifest.toml') }}-${{ github.run_id }}
          restore-keys: |
            nix-${{ hashFiles('.flox/env/manifest.toml') }}-
            nix-

      - name: Check for existing Flox installation
        id: flox-check
        run: |
          if command -v flox &>/dev/null; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
            echo "Flox already installed: $(flox --version)"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upgrade Flox
        if: steps.flox-check.outputs.installed == 'true'
        run: flox upgrade

      - name: Install Flox
        if: steps.flox-check.outputs.installed != 'true'
        uses: flox/install-flox-action@v2

      - name: Ensure nix-daemon is running
        run: |
          if command -v systemctl &>/dev/null && systemctl is-system-running &>/dev/null 2>&1; then
            sudo systemctl start nix-daemon
          else
            sudo mkdir -p /nix/var/nix/daemon-socket
            sudo nix-daemon &
          fi
          for i in $(seq 1 100); do
            if nix --extra-experimental-features nix-command store ping &>/dev/null; then
              echo "nix-daemon is ready"
              break
            fi
            sleep 0.1
          done
          nix --extra-experimental-features nix-command store ping &>/dev/null || { echo "ERROR: nix-daemon failed to start"; exit 1; }

      - name: Activate Flox environment (verbose)
        run: flox activate -vv -- true

      - name: Update Flox packages
        id: update
        run: |
          # Run flox update and capture output
          flox update 2>&1 | tee flox-update.log

          # Check if there were any updates
          if git diff --quiet .flox/; then
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "No Flox updates available"
          else
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "Flox packages were updated"
          fi

      - name: Create Pull Request
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          commit-message: 'chore(flox): update environment packages'
          committer: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          branch: flox/update-packages
          delete-branch: true
          title: 'chore(flox): update environment packages'
          body: |
            ## Flox Environment Update

            This PR updates the Flox environment packages to their latest versions.

            ### Changes

            The following Flox packages have been updated:

            ```
            ${{ steps.update.outputs.log }}
            ```

            ### Testing Checklist

            - [ ] Environment activates successfully: `flox activate`
            - [ ] Go toolchain works: `go version`
            - [ ] Build succeeds: `just build`
            - [ ] Tests pass: `just test`
            - [ ] Kubernetes tools work: `kubectl version --client`

            ### Notes

            This is an automated PR created by the Flox update workflow.
            Since Renovate doesn't support Flox manifests yet, we use this scheduled workflow.

            See: https://discourse.flox.dev/t/enable-renovate-to-manage-versions-in-manifest-toml/1093
          labels: |
            dependencies
            flox
            automated
          draft: false

      - name: Fix Nix permissions for caching
        if: always()
        run: sudo chmod -R a+r /nix && sudo find /nix -type d -exec chmod a+rx {} +

      - name: Save Nix cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('.flox/env/manifest.toml') }}-${{ github.run_id }}
