name: Import secrets and variables to Depot CI
on: push

permissions:
  id-token: write
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: Import secrets
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        run: |
          unset DEPOT_TOKEN
          depot ci secrets add DAGGER_CLOUD_TOKEN="$DAGGER_CLOUD_TOKEN" --repo cullenmcdermott/external-dns-nextdns
