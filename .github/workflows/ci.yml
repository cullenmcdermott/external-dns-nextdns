name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    env:
      FLOX_DISABLE_METRICS: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install Flox
        uses: flox/install-flox-action@v2

      - name: Activate Flox environment
        run: flox activate --verbose -- echo "Flox environment activated"

      - name: Lint
        run: flox activate -- golangci-lint run --timeout 5m ./...

      - name: Test
        run: flox activate -- go test -v -race ./...

      - name: Build
        run: flox activate -- go build -ldflags="-s -w -X main.Version=dev" -o webhook ./cmd/webhook
