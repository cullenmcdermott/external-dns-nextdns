    "vars": {
      "BINARY_NAME": "webhook",
      "CGO_ENABLED": "0",
      "DOCKER_IMAGE": "external-dns-nextdns-webhook",
      "GO111MODULE": "on",
      "KIND_CLUSTER_NAME": "kind-external-dns-dev",
      "LOG_LEVEL": "info",
      "PROJECT_NAME": "external-dns-nextdns-webhook",
      "VERSION": "dev"
    },
    "hook": {
      "on-activate": "# Workaround for glibc TLS race condition in GitHub Actions\nunset LD_AUDIT\n\nsetup_go_deps() {\n  local deps_flag=\"$FLOX_ENV_CACHE/.go_deps_installed\"\n  if [ ! -f \"$deps_flag\" ] && [ -f \"$FLOX_ENV_PROJECT/go.mod\" ]; then\n    go mod download && touch \"$deps_flag\"\n  fi\n}\n\nsetup_kubectl_context() {\n  if kind get clusters 2>/dev/null | grep -q \"^${KIND_CLUSTER_NAME}$\"; then\n    kubectl config use-context \"${KIND_CLUSTER_NAME}\" >/dev/null 2>&1\n  fi\n}\n\nexport GOENV=\"${GOENV:-${FLOX_ENV_CACHE:-/tmp}/goenv}\"\nexport GOCACHE=\"${GOCACHE:-${FLOX_ENV_CACHE:-/tmp}/go-build}\"\nexport GOMODCACHE=\"${GOMODCACHE:-${FLOX_ENV_CACHE:-/tmp}/go/pkg/mod}\"\nmkdir -p \"$GOENV\" \"$GOCACHE\" \"$GOMODCACHE\"\n\nsetup_git_hooks() {\n  local hook_dir=\"$FLOX_ENV_PROJECT/.git/hooks\"\n  local hook_file=\"$hook_dir/pre-commit\"\n  local marker=\"# managed by flox\"\n  if [ -d \"$FLOX_ENV_PROJECT/.git\" ] && { [ ! -f \"$hook_file\" ] || grep -q \"$marker\" \"$hook_file\"; }; then\n    cat > \"$hook_file\" <<'HOOK'\n#!/usr/bin/env bash\n# managed by flox\nset -euo pipefail\nif ! command -v golangci-lint >/dev/null 2>&1; then\n  echo \"warning: golangci-lint not found, skipping pre-commit lint (activate flox env)\" >&2\n  exit 0\nfi\nexec golangci-lint run --new-from-rev=HEAD\nHOOK\n    chmod +x \"$hook_file\"\n  fi\n}\n\nsetup_go_deps\nsetup_kubectl_context\nsetup_git_hooks\ncd \"$FLOX_ENV_PROJECT\"\n"
    },
    "options": {},
    "services": {
      "dev": {
        "command": "set -e\ncd \"$FLOX_ENV_PROJECT\"\n\ncleanup() {\n  echo \"Cleaning up development environment...\"\n  tilt down 2>/dev/null || true\n  ctlptl delete cluster kind-external-dns-dev 2>/dev/null || true\n}\n\ntrap cleanup EXIT INT TERM\n\nexport KUBECONFIG=\"$HOME/.kube/config\"\nctlptl apply -f ctlptl-config.yaml\nkubectl config use-context \"${KIND_CLUSTER_NAME}\"\nkubectl wait --for=condition=Ready nodes --all --timeout=90s\ntilt up --host 0.0.0.0 --port 10350\n"
      }
    }
  },
